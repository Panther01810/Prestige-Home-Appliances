<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Prestige Home Appliances</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Prestige Home Appliances</h1>
    <nav>
        <a href="Home.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="gallery.html">Products</a>
        <a href="directors.html">Directors</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<section>
    <h2>Contact Us</h2>

    <form id="contactForm">
        <label>Full Name:</label><br>
        <input type="text" id="name"><br><br>

        <label>Email:</label><br>
        <input type="email" id="email"><br><br>

        <label>Phone Number:</label><br>
        <input type="text" id="phone"><br><br>

        <label>Message:</label><br>
        <textarea id="message"></textarea><br><br>

        <button type="submit">Send Message</button>
    </form>

</section>

<!-- CHATBOT BUTTON -->
<div class="chatbot-button" onclick="toggleChatbot()">
    💬 Chat with us
</div>

<!-- CHATBOT WINDOW -->
<div class="chatbot-container" id="chatbot">
    <div class="chat-header">
        Prestige Support
        <span onclick="toggleChatbot()">✖</span>
    </div>

    <div class="chat-body" id="chatBody">
        <p class="bot">Welcome to Prestige Home Appliances.<br>
        How can we help you today?</p>
       <div class="suggestions">
        <button onclick="quickQuestion('products')">Products</button>
        <button onclick="quickQuestion('price')">Prices</button>
        <button onclick="quickQuestion('delivery')">Delivery</button>
        <button onclick="quickQuestion('location')">Location</button>
        <button onclick="quickQuestion('contact')">Contact</button>
    </div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask a question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 Prestige Home Appliances</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
